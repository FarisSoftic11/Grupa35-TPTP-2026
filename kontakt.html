<!DOCTYPE html>
<html lang="bs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kontakt | Elite Rent A Car</title>
    <link rel="stylesheet" href="css/tptpstil.css">
</head>
<body>

    <header>
        <div class="header-container">
            <div class="logo-box">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQA4ILBJS1DezZztDrqTsZK33ef9iPwFSbWRQ&s" alt="Elite Rent A Car Logo">
                <h1>Elite Rent A Car</h1>
            </div>
            <nav id="glavni-meni">
                <ul class="nav-lista">
                    <li><a href="index.html">Početna</a></li>
                    <li><a href="sadrzaj.html">Vozni park</a></li>
                    <li><a href="sadrzaj.html#pravila-sekcija">Pravila korištenja</a></li>
                    <li><a href="kontakt.html" class="active">Kontakt</a></li>
                    <li><a href="https://github.com/FarisSoftic11/Grupa35-TPTP-2026" target="_blank">GitHub</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <section id="kontakt-forma-sekcija">
            <div class="container">
                <h2 class="centriran-naslov">Pošaljite nam upit</h2>
                
                <div id="uspjeh-kontejner" style="display:none; text-align:center; padding: 20px; background: #d4edda; color: #155724; border-radius: 8px; margin-bottom: 20px;">
                    <h3 id="uspjeh-tekst"></h3>
                </div>

                <form id="forma-za-upit" novalidate>
                    <div class="form-red">
                        <div class="form-grupa">
                            <label for="ime">Ime:</label>
                            <input type="text" id="ime" name="ime" placeholder="Vaše ime">
                            <span class="error-poruka" id="error-ime"></span>
                        </div>
                        <div class="form-grupa">
                            <label for="prezime">Prezime:</label>
                            <input type="text" id="prezime" name="prezime" placeholder="Vaše prezime">
                            <span class="error-poruka" id="error-prezime"></span>
                        </div>
                    </div>

                    <div class="form-grupa">
                        <label for="email-adresa">E-mail adresa:</label>
                        <input type="email" id="email-adresa" name="email-adresa" placeholder="primjer@mail.com">
                        <span class="error-poruka" id="error-email"></span>
                    </div>

                    <div class="form-grupa">
                        <label for="telefon">Broj telefona:</label>
                        <input type="text" id="telefon" name="telefon" placeholder="061 123-456">
                        <span class="error-poruka" id="error-telefon"></span>
                    </div>

                    <div class="form-grupa">
                        <label for="vrsta-upita">Zanima me:</label>
                        <select id="vrsta-upita" name="vrsta-upita">
                            <option value="">Odaberite temu...</option>
                            <option value="najam">Najam vozila</option>
                            <option value="poslovna-saradnja">Poslovna saradnja</option>
                            <option value="tehnicka-podrska">Tehnička podrška</option>
                            <option value="ostalo">Ostalo</option>
                        </select>
                        <span class="error-poruka" id="error-upit"></span>
                    </div>

                    <div class="form-grupa">
                        <label for="poruka">Vaša poruka:</label>
                        <textarea id="poruka" name="poruka" rows="5" placeholder="Kako vam možemo pomoći?"></textarea>
                        <span class="error-poruka" id="error-poruka-text"></span>
                    </div>

                    <div class="form-akcija">
                        <button type="submit" id="dugme-posalji" class="glavno-dugme">Pošalji poruku</button>
                        <button type="reset" id="dugme-reset" class="reset-dugme">Resetuj formu</button>
                    </div>
                </form>
            </div>
        </section>
    </main>

    <footer>
        <div class="footer-info" style="text-align: center; padding: 20px;">
            <p><strong>Elite Rent A Car d.o.o.</strong> | 2026</p>
        </div>
    </footer>

    <script src="js/tptpskripte.js"></script>
</body>
</html>
